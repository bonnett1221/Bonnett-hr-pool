<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonnett HR Pool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Bonnett HR Pool</h1>
        <p class="subtitle">Live MLB Home Run Pool</p>
      </div>
    </header>

    <section class="hero-actions">
      <button class="primary-btn" onclick="updateHRs()">Update All HR Totals</button>
    </section>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Teams</div>
        <div class="stat-value" id="statTeams">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Top Team Score</div>
        <div class="stat-value" id="statTopScore">0 HR</div>
        <div class="stat-subtext" id="statTopTeam">—</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">League Home Runs</div>
        <div class="stat-value" id="statLeagueHR">0</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Leaderboard</h2>
          <p>Tap a team below to view the full roster.</p>
        </div>
      </div>
      <div id="leaderboard" class="leaderboard-list"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Team Viewer</h2>
          <p>See the active 9 and current bench player.</p>
        </div>
      </div>

      <div class="select-wrap">
        <label for="teamSelect">Select Team</label>
        <select id="teamSelect"></select>
      </div>

      <div id="players"></div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
